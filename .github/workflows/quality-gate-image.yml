---
name: Quality Gate container

"on":
  pull_request:
    paths:
      - ".github/workflows/quality-gate-image.yml"
      - "docs/plano-gitlab-quality-gate.md"
      - "docs/proximos-passos-publicacao-segura.md"
      - "examples/ci/gitlab-quality-gate.yml"
      - "quality-gate/**"
  push:
    tags:
      - "quality-v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/rodrigojager/code-approval-quality-gate

jobs:
  validate:
    name: Validate image build
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./quality-gate
          file: ./quality-gate/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: code-approval-quality-gate:pr-test

      - name: Smoke test image runtime and report writes
        shell: bash
        run: |
          smoke_dir="$RUNNER_TEMP/quality-gate-smoke"
          mkdir -p "$smoke_dir"
          printf '%s\n' 'const answer = 42;' > "$smoke_dir/sample.js"
          docker run --rm \
            --user 0 \
            --mount "type=bind,source=$smoke_dir,target=/workspace" \
            code-approval-quality-gate:pr-test \
            check /workspace \
              --mode quick \
              --format json,md \
              --output /workspace/.quality/reports
          test -s "$smoke_dir/.quality/reports/quality-report.json"
          test -s "$smoke_dir/.quality/reports/quality-report.md"

  publish:
    name: Publish versioned image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/quality-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Verify tagged commit belongs to main
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=match,pattern=quality-v(.*),group=1
            type=sha,prefix=sha-

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./quality-gate
          file: ./quality-gate/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Record published digest
        shell: bash
        run: |
          echo "Image: ${{ env.IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
