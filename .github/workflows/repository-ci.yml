name: Repository CI

on:
  pull_request:
  push:
    branches:
      - main
      - final

permissions:
  contents: read

concurrency:
  group: repository-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Check patch hygiene
        shell: pwsh
        run: |
          $base = "${{ github.event.pull_request.base.sha || github.event.before }}"
          $head = "${{ github.event.pull_request.head.sha || github.sha }}"
          $baseExists = $base -and $base -notmatch '^0+$'
          if ($baseExists) {
            git cat-file -e "$base`^{commit}" 2>$null
            $baseExists = $LASTEXITCODE -eq 0
          }
          if ($baseExists) {
            git diff --check "$base...$head"
          } else {
            git show --check --format= $head
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify clean checkout
        shell: pwsh
        run: ./scripts/verify-all.ps1

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install verified Gitleaks 8.30.1 and create trusted policy
        shell: bash
        run: |
          set -euo pipefail
          version=8.30.1
          expected_sha256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          archive="gitleaks_${version}_linux_x64.tar.gz"
          trusted_dir="$RUNNER_TEMP/code-approval-gitleaks"
          install -d -m 0700 "$trusted_dir"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}" -o "$trusted_dir/$archive"
          printf '%s  %s\n' "$expected_sha256" "$trusted_dir/$archive" | sha256sum -c -
          tar -xzf "$trusted_dir/$archive" -C "$trusted_dir" gitleaks
          printf '%s\n' '[extend]' 'useDefault = true' > "$trusted_dir/gitleaks.toml"
          : > "$trusted_dir/gitleaksignore"
          chmod 0444 "$trusted_dir/gitleaks.toml" "$trusted_dir/gitleaksignore"
          "$trusted_dir/gitleaks" version
          {
            echo "TRUSTED_GITLEAKS_BIN=$trusted_dir/gitleaks"
            echo "TRUSTED_GITLEAKS_CONFIG=$trusted_dir/gitleaks.toml"
            echo "TRUSTED_GITLEAKS_IGNORE=$trusted_dir/gitleaksignore"
          } >> "$GITHUB_ENV"

      - name: Scan complete Git history and working tree with trusted policy
        shell: bash
        run: |
          set -euo pipefail
          common_args=(
            --config "$TRUSTED_GITLEAKS_CONFIG"
            --gitleaks-ignore-path "$TRUSTED_GITLEAKS_IGNORE"
            --ignore-gitleaks-allow
            --redact=100
            --report-format json
          )
          set +e
          "$TRUSTED_GITLEAKS_BIN" "${common_args[@]}" \
            --report-path "$RUNNER_TEMP/gitleaks-history.json" \
            git . --log-opts="--all"
          history_status=$?
          "$TRUSTED_GITLEAKS_BIN" "${common_args[@]}" \
            --report-path "$RUNNER_TEMP/gitleaks-working-tree.json" \
            dir .
          working_tree_status=$?
          set -e
          if (( history_status != 0 || working_tree_status != 0 )); then
            echo "Gitleaks failed: history=$history_status working-tree=$working_tree_status" >&2
            exit 1
          fi
