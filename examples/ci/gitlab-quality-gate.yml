quality_gate:
  stage: test
  image: docker:28
  services:
    - name: docker:28-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache nodejs npm
    - npm install -g quality-check
  script:
    - quality-check . --threshold 90 --format=json,md --output .quality/reports
  artifacts:
    when: always
    paths:
      - .quality/reports/
  rules:
    - if: $CI_MERGE_REQUEST_IID
