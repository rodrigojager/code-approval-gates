quality_gate:
  stage: test
  image: node:22
  variables:
    GIT_DEPTH: "0"
  before_script:
    - npm install -g code-approval-gates
  script:
    - code-approval-gates doctor quality --ci --no-interactive
    - code-approval-gates quality --ci --scope changed --format json,md --output code-approval-report --no-interactive
  artifacts:
    when: always
    paths:
      - code-approval-report/
    expire_in: 14 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
