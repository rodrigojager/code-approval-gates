name: code-approval-gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  code-approval-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install -g code-approval-gates
      - run: code-approval-gates doctor --ci --no-interactive
      - run: code-approval-gates run --ci --scope changed --format json,md --output code-approval-report --no-interactive
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-approval-report
          path: code-approval-report/
